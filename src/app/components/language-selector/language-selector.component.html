<mat-form-field appearance="outline" class="lang-select">
  <mat-label>{{ 'NAVBAR.LANGUAGE' | translate }}</mat-label>
  <mat-select [value]="currentLang()" (selectionChange)="changeLanguage($event.value)">
    @for (lang of languages; track lang.code) {
    <mat-option [value]="lang.code">
      {{ lang.flag }} {{ lang.name }}
    </mat-option>
    }
  </mat-select>
</mat-form-field>
